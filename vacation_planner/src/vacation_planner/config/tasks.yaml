# Configuration for tasks in the vacation planner project.
research_task:
  description: >
    Analyze the user request on the topic {topic}.
    If the request is about travel packages, deals, or pricing, use ONLY the Get Travel Packages tool to get the travel packages for the {topic}. DO NOT use any other tools.
    If the request is about planning an itinerary, attractions, or activities, search the information from the web and research about the travel destination {topic}.
    Find interesting and relevant information to enrich the travel experience.
  expected_output: >
    If the request is about travel packages, deals, or pricing, return the travel packages for the {topic}.
    If the request is about planning an itinerary, attractions, or activities, return the research findings about the travel destination {topic} that will include a list of 15 bullet points highlighting the most important and exciting facts about {topic} and the most popular tourist spots.
  agent: vacation_researcher

reporting_task:
  description: >
    Review the research findings and create a detailed report about {topic}.
  expected_output: >
    A fully fledged report summarizing key information about {topic},
    formatted in Markdown without using code block syntax (do not use triple backticks).
  agent: itinerary_planner
  output_file: report.md
  output_format: markdown
